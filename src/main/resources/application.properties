# Server Configuration
server.port=9100

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:userdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Gmail Configuration
spring.mail.host=${SPRING_MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${SPRING_MAIL_PORT:2525}
spring.mail.username=${SPRING_MAIL_USERNAME:1b733dd5ced114}
spring.mail.password=${SPRING_MAIL_PASSWORD:c248ab4c0613d9}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000

# Application Specific Configuration
app.rabbitmq.exchange=user-exchange
app.rabbitmq.queue=email-queue
app.rabbitmq.routingkey=email.notification

# Product Service RabbitMQ Configuration
app.rabbitmq.product.exchange=product-exchange
app.rabbitmq.product.queue=product-queue
app.rabbitmq.product.routingkey=product.notification

# Admin Configuration
app.admin.email=admin@example.com
